[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "tigrbl_engine_inmemcache"
version = "0.1.0"
description = "Process-local TTL/LRU cache engine plugin for Tigrbl."
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
keywords = ["tigrbl", "engine", "cache", "ttl", "lru", "inmemory"]
requires-python = ">=3.10,<3.13"
classifiers = [
    "Development Status :: 1 - Planning",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = ["tigrbl>=0.3.0.dev4"]

[project.urls]
Homepage = "https://github.com/swarmauri/swarmauri-sdk"

[project.entry-points."tigrbl.engine"]
inmemcache = "tigrbl_engine_inmemcache.plugin:register"

[dependency-groups]
dev = [
    "ruff>=0.11.0",
]
