[project]
name = "swarmauri_middleware_circuitbreaker"
version = "0.7.4.dev6"
description = "Async circuit-breaker middleware for Swarmauri and FastAPI request flows backed by pybreaker."
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.10,<3.15"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Natural Language :: English",
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "Operating System :: OS Independent",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
dependencies = [
    "fastapi",
    "pybreaker",
    "swarmauri_core",
    "swarmauri_base",
    "swarmauri_standard"
]
keywords = [
    "swarmauri",
    "middleware",
    "circuitbreaker",
    "circuit",
    "breaker",
    "fastapi",
    "resilience",
    "fault tolerance",
    "pybreaker",
    "request middleware",
]

[tool.uv.sources]
swarmauri_core = {workspace = true}
swarmauri_base = {workspace = true}
swarmauri_standard = {workspace = true}

[tool.pytest.ini_options]
norecursedirs = ["combined", "scripts"]
markers = [
    "test: standard test",
    "unit: Unit tests",
    "i9n: Integration tests",
    "r8n: Regression tests",
    "timeout: mark test to timeout after X seconds",
    "xpass: Expected passes",
    "xfail: Expected failures",
    "acceptance: Acceptance tests",
    "perf: Performance tests that measure execution time and resource usage"
]
timeout = 300
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)s] %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"
asyncio_default_fixture_loop_scope = "function"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "pytest-xdist>=3.6.1",
    "pytest-mock>=3.12.0",
    "pytest-json-report>=1.5.0",
    "python-dotenv",
    "httpx>=0.27",
    "flake8>=7.0",
    "pytest-timeout>=2.3.1",
    "ruff>=0.9.9",
    "pytest-benchmark>=4.0.0"
]

[project.entry-points.'swarmauri.middlewares']
CircuitBreakerMiddleware = "swarmauri_middleware_circuitbreaker:CircuitBreakerMiddleware"
