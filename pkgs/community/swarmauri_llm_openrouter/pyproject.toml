[project]
name = "swarmauri_llm_openrouter"
version = "0.1.0.dev1"
description = "OpenRouter models for Swarmauri chat, tool-calling, vision-language, and image-generation workflows."
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/swarmauri/swarmauri-sdk"
requires-python = ">=3.10,<3.13"
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
dependencies = [
    "httpx>=0.27",
    "swarmauri_core",
    "swarmauri_base",
    "swarmauri_standard",
]
keywords = [
    "swarmauri",
    "openrouter",
    "large language model",
    "vision language model",
    "image generation",
    "tool calling",
    "multimodal",
    "provider routing",
    "structured output",
    "generative ai",
]

[tool.uv.sources]
swarmauri_core = { workspace = true }
swarmauri_base = { workspace = true }
swarmauri_standard = { workspace = true }

[project.entry-points."swarmauri.llms"]
OpenRouterModel = "swarmauri_llm_openrouter:OpenRouterModel"

[project.entry-points."swarmauri.tool_llms"]
OpenRouterToolModel = "swarmauri_llm_openrouter:OpenRouterToolModel"

[project.entry-points."swarmauri.vlms"]
OpenRouterVLM = "swarmauri_llm_openrouter:OpenRouterVLM"

[project.entry-points."swarmauri.image_gens"]
OpenRouterImgGenModel = "swarmauri_llm_openrouter:OpenRouterImgGenModel"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "pytest-timeout>=2.3.1",
    "ruff>=0.9.9",
    "swarmauri_tests_component",
]

[tool.pytest.ini_options]
markers = [
    "unit: Unit tests",
    "i9n: Integration tests",
    "r8n: Regression tests",
]
asyncio_default_fixture_loop_scope = "function"
