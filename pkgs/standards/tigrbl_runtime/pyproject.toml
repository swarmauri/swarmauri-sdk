[project]
name = "tigrbl-runtime"
version = "0.1.0.dev13"
description = "Runtime pipeline and executor components for Tigrbl."
license = "Apache-2.0"
readme = "README.md"
repository = "http://github.com/swarmauri/swarmauri-sdk"
requires-python = ">=3.10,<3.13"
classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Development Status :: 1 - Planning",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
]
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
dependencies = [
    "tigrbl-typing",
    "tigrbl-kernel",
    "tigrbl-concrete",
    "tigrbl-atoms",
    "numba>=0.61.2",
]
keywords = ["tigrbl", "sdk", "standards", "framework"]

[tool.uv.sources]
"tigrbl-typing" = { workspace = true }
"tigrbl-kernel" = { workspace = true }
"tigrbl-concrete" = { workspace = true }
"tigrbl-atoms" = { workspace = true }

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"


[tool.poetry]
packages = [
    { include = "tigrbl_runtime" },
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.9",
]
