[project]
name = "swarmauri_video_lipsync_synclabs"
version = "0.1.0.dev2"
description = "Standalone Sync Labs queued lip-sync video provider for Swarmauri."
license = "Apache-2.0"
readme = { file = "README.md", content-type = "text/markdown" }
repository = "https://github.com/swarmauri/swarmauri-sdk"
requires-python = ">=3.10,<3.13"
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
keywords = [
    "swarmauri",
    "sync labs",
    "lip sync",
    "video generation",
    "video dubbing",
    "media localization",
    "queued api",
    "multimodal ai",
]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Video",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.0",
    "swarmauri_base",
    "swarmauri_core",
]

[tool.uv.sources]
swarmauri_base = { workspace = true }
swarmauri_core = { workspace = true }

[project.entry-points."swarmauri.video_lipsync"]
SyncLabsLipSync = "swarmauri_video_lipsync_synclabs:SyncLabsLipSync"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = ["unit: Unit tests"]

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.9.9",
]
