[project]
name = "tigrbl-atoms"
version = "0.1.0.dev0"
description = "Runtime atom utilities and execution helpers for Tigrbl."
license = "Apache-2.0"
readme = "README.md"
repository = "http://github.com/swarmauri/swarmauri-sdk"
requires-python = ">=3.10,<3.13"
classifiers = [
    "License :: OSI Approved :: Apache Software License",
    "Development Status :: 1 - Planning",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
]
authors = [{ name = "Jacob Stewart", email = "jacob@swarmauri.com" }]
dependencies = [
    "tigrbl-ops-oltp",
    "tigrbl-core",
    "tigrbl-typing",
    "jinja2>=3.1",
]
keywords = ["tigrbl", "sdk", "standards", "framework"]

[tool.uv.sources]
"tigrbl-ops-oltp" = { workspace = true }
"tigrbl-core" = { workspace = true }
"tigrbl-typing" = { workspace = true }

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"


[tool.poetry]
packages = [
    { include = "tigrbl_atoms" },
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24.0",
    "pytest-timeout>=2.3.1",
    "ruff>=0.9",
]
