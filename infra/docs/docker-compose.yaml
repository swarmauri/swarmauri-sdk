x-as-user: &as_user
  user: "${RUN_UID}:${RUN_GID}"
  environment:
    HOME: "/tmp"
    ZDX_FAILURE_MODE: "${ZDX_FAILURE_MODE:-warn}"
  init: true

services:
  swarmauri-sdk-docs:
    <<: *as_user
    build:
      context: ../../
      dockerfile: pkgs/community/zdx/Dockerfile
    container_name: swarmauri-sdk-docs
    volumes:
      - ./swarmauri-sdk:/docs
      - ../../pkgs:/pkgs
    depends_on:
      - nginx-proxy-manager
    networks:
      - dockernet
    restart: unless-stopped

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - /mnt/data/npm/data:/data
      - /mnt/data/npm/letsencrypt:/etc/letsencrypt
    environment:
      DISABLE_IPV6: "true"
    networks:
      - dockernet
    restart: unless-stopped

networks:
  dockernet:
    driver: bridge
